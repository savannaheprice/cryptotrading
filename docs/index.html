<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bitcoin Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            text-align: center;
            padding: 30px;
        }
        h1 {
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            margin-top: 20px;
        }
        .footer {
            margin-top: 20px;
            opacity: 0.7;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>📈 Bitcoin Price (Last 30 Days)</h1>
    <div class="card">
        <canvas id="chart"></canvas>
    </div>
    <div class="footer">Data from CoinGecko • Generated 2026-06-05 18:11 UTC</div>
 
    <script>
        const BITCOIN_DATA = [{"date": "May 07", "price": 81425.0}, {"date": "May 08", "price": 80022.04}, {"date": "May 09", "price": 80189.07}, {"date": "May 10", "price": 80678.03}, {"date": "May 11", "price": 82145.66}, {"date": "May 12", "price": 81725.21}, {"date": "May 13", "price": 80480.89}, {"date": "May 14", "price": 79277.8}, {"date": "May 15", "price": 81051.98}, {"date": "May 16", "price": 79068.82}, {"date": "May 17", "price": 78135.01}, {"date": "May 18", "price": 77425.72}, {"date": "May 19", "price": 76952.21}, {"date": "May 20", "price": 76808.81}, {"date": "May 21", "price": 77459.94}, {"date": "May 22", "price": 77546.34}, {"date": "May 23", "price": 75482.52}, {"date": "May 24", "price": 76672.79}, {"date": "May 25", "price": 76988.16}, {"date": "May 26", "price": 77274.4}, {"date": "May 27", "price": 75824.06}, {"date": "May 28", "price": 74352.7}, {"date": "May 29", "price": 73539.84}, {"date": "May 30", "price": 73382.72}, {"date": "May 31", "price": 73751.07}, {"date": "Jun 01", "price": 73593.37}, {"date": "Jun 02", "price": 71360.33}, {"date": "Jun 03", "price": 66649.86}, {"date": "Jun 04", "price": 64021.89}, {"date": "Jun 05", "price": 63796.25}, {"date": "Jun 05", "price": 60719.34}];
 
        const labels = BITCOIN_DATA.map(p => p.date);
        const prices = BITCOIN_DATA.map(p => p.price);
 
        const ctx = document.getElementById('chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'BTC Price (USD)',
                    data: prices,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56,189,248,0.2)',
                    tension: 0.3,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: '#f8fafc' }
                    }
                },
                scales: {
                    x: { ticks: { color: '#cbd5f5' } },
                    y: { ticks: { color: '#cbd5f5' } }
                }
            }
        });
    </script>
</body>
</html>
