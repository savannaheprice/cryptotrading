name: Deploy Bitcoin Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "app.py"
      - "scripts/generate_static.py"
      - ".github/workflows/deploy.yml"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate docs/index.html
        run: python3 scripts/generate_static.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/index.html

          if git diff --cached --quiet; then
            echo "docs/index.html is already up to date — nothing to commit."
          else
            git commit -m "chore: regenerate index.html [skip ci]"
            git push
            echo "✅  docs/index.html updated and pushed to main."
          fi